<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Mondiale 2026"/>
<meta name="theme-color" content="#0D1B2A"/>
<title>⚽ Mondiale 2026 — Pronostici</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0D1B2A;color:#F0F4F8;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#1A3A5C;border-radius:3px;}
button{cursor:pointer;font-family:inherit;}

#header{background:linear-gradient(135deg,#1A3A5C,#0D1B2A);border-bottom:2px solid #1E88E5;
  padding:16px;position:sticky;top:0;z-index:100;}
#header h1{font-size:17px;font-weight:800;margin-bottom:2px;}
#header p{font-size:11px;color:#8899AA;}
#tabs{display:flex;gap:4px;margin-top:12px;}
.tab{flex:1;padding:8px 4px;border:none;border-radius:8px;font-size:13px;font-weight:700;
  background:rgba(255,255,255,0.07);color:#8899AA;transition:all .15s;}
.tab.active{background:#1E88E5;color:#fff;}

#content{padding:14px;}
.section{display:none;}
.section.active{display:block;}

/* CLASSIFICA */
.label{font-size:11px;color:#8899AA;letter-spacing:.5px;margin-bottom:10px;}
.card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  margin-bottom:6px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);}
.card.top1{background:linear-gradient(90deg,rgba(30,136,229,.22),transparent);border-color:rgba(30,136,229,.4);}
.card.top2,.card.top3{background:rgba(255,255,255,.04);}
.medal{width:28px;text-align:center;font-size:18px;font-weight:800;}
.num{width:28px;text-align:center;font-size:13px;color:#8899AA;font-weight:800;}
.info{flex:1;}
.nome{font-size:14px;font-weight:700;}
.bar-row{display:flex;align-items:center;gap:8px;margin-top:4px;}
.bar-bg{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:rgba(30,136,229,.5);transition:width .4s;}
.bar-fill.top{background:#1E88E5;}
.gbreak{font-size:11px;color:#8899AA;white-space:nowrap;}
.circle{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;background:rgba(255,255,255,.07);}
.circle.top{background:#1E88E5;}

/* DETTAGLIO */
.gtabs{display:flex;gap:5px;margin-bottom:12px;}
.gbtn{flex:1;padding:7px;border:none;border-radius:8px;font-size:13px;font-weight:700;
  background:rgba(255,255,255,.07);color:#8899AA;}
.gbtn.active{background:#1E88E5;color:#fff;}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{border-collapse:collapse;font-size:11px;width:100%;}
th{padding:5px 3px;color:#8899AA;font-weight:700;border-bottom:1px solid rgba(255,255,255,.08);}
th.vname{writing-mode:vertical-rl;transform:rotate(180deg);height:68px;vertical-align:bottom;
  font-size:9px;white-space:nowrap;padding:2px;}
td{padding:4px 3px;border-bottom:1px solid rgba(255,255,255,.03);text-align:center;}
td.match{text-align:left;white-space:nowrap;font-weight:600;color:#F0F4F8;min-width:70px;}
td.ris{font-weight:800;}
.ris-badge{background:#1E88E5;color:#fff;border-radius:4px;padding:2px 6px;font-size:12px;}
.ok{color:#00C853;font-weight:700;}
.ko{color:#FF3B30;font-weight:700;}
.nd{color:#8899AA;}
td.ok-bg{background:rgba(0,200,83,.18);}
td.ko-bg{background:rgba(255,59,48,.12);}

/* INSERISCI */
.match-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;
  margin-bottom:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);}
.match-row.done{background:rgba(30,136,229,.1);border-color:rgba(30,136,229,.3);}
.match-info{flex:1;}
.match-info b{font-size:12px;font-weight:700;}
.match-info small{font-size:10px;color:#8899AA;display:block;}
.btn1x2{width:38px;height:38px;border-radius:8px;border:none;font-size:15px;font-weight:800;
  background:rgba(255,255,255,.08);color:#8899AA;transition:all .12s;}
.btn1x2.sel1{background:#1565C0;color:#fff;}
.btn1x2.selX{background:#6A1B9A;color:#fff;}
.btn1x2.sel2{background:#B71C1C;color:#fff;}
.ris-count{font-size:11px;color:#8899AA;margin-bottom:10px;}
</style>
</head>

<div id="header">
  <h1>⚽ Mondiale 2026 — Pronostici</h1>
  <p id="subhead">Caricamento...</p>

    <button class="tab" onclick="showTab('inserisci')">✏️ Inserisci</button>

</div>

<div id="content">
  <div id="classifica" class="section active"></div>
  <div id="dettaglio" class="section">
    <div class="gtabs">

      <button class="gbtn" onclick="setGdet(3,this)">Giornata 3</button>
    </div>
    <div id="det-table"></div>
  </div>
  <div id="inserisci" class="section">
    <div class="gtabs">
      <button class="gbtn active" onclick="setGins(1,this)">Giornata 1</button>
      <button class="gbtn" onclick="setGins(2,this)">Giornata 2</button>
      <button class="gbtn" onclick="setGins(3,this)">Giornata 3</button>
    </div>
    <div id="ins-count" class="ris-count"></div>
    <div id="ins-list"></div>
  </div>
</div>

// ── RISULTATI NOTI ────────────────────────────────────────────────────────────
var RIS = {
 "MEX-SUD":"1",    // Messico 2-0 Sudafrica
 "COR-CEC":"1",    // Corea del Sud 2-1 Rep. Ceca
 "CAN-BOS":"X",    // Canada 1-1 Bosnia
 "USA-PAR":"1",    // USA 4-1 Paraguay
 "QAT-SVIZ":"X",   // Qatar 1-1 Svizzera (Khoukhi 90+4')
 "BRA-MAR":"X",    // Brasile 1-1 Marocco (Saibari 21', Vinicius 32')

};

// ── STATO ─────────────────────────────────────────────────────────────────────
var gDet = 1, gIns = 1;

function totPartite(){ return G.reduce(function(s,g){return s+g.partite.length;},0); }

function punteggi(){
 var pt = {};
 GIOCATORI.forEach(function(g){ pt[g]={tot:0,g1:0,g2:0,g3:0}; });
 G.forEach(function(gd,gi){
  gd.partite.forEach(function(p,i){
   var r=RIS[p.id]; if(!r) return;
   GIOCATORI.forEach(function(g){
    if(P[gi][g]&&P[gi][g][i]===r){ pt[g].tot++; pt[g]["g"+(gi+1)]++; }
   });
  });
 });
 return pt;
}

function renderClassifica(){
 var pt = punteggi();
 var list = GIOCATORI.map(function(g){return {nome:g,tot:pt[g].tot,g1:pt[g].g1,g2:pt[g].g2,g3:pt[g].g3};});
 list.sort(function(a,b){return b.tot-a.tot;});
 var maxPt = list[0]?list[0].tot:1;
 var html='<div class="label">CLASSIFICA GENERALE &bull; '+GIOCATORI.length+' PARTECIPANTI</div>';
 list.forEach(function(p,idx){
  var medal=["🥇","🥈","🥉"][idx]||null;
  var barW=Math.round((p.tot/(maxPt+3))*100);
  var cls="card"+(idx===0?" top1":idx===1?" top2":idx===2?" top3":"");
  html+='<div class="'+cls+'">';
  html+= medal?'<div class="medal">'+medal+'</div>':'<div class="num">'+(idx+1)+'</div>';
  html+='<div class="info"><div class="nome">'+p.nome+'</div>';
  html+='<div class="bar-row"><div class="bar-bg"><div class="bar-fill'+(idx===0?" top":"")+'" style="width:'+barW+'%"></div></div>';
  html+='<div class="gbreak">G1:'+p.g1+' G2:'+p.g2+' G3:'+p.g3+'</div></div></div>';
  html+='<div class="circle'+(idx===0?" top":"")+'">'+p.tot+'</div></div>';
 });
 document.getElementById('classifica').innerHTML=html;
 var tot=Object.keys(RIS).length;
 document.getElementById('subhead').textContent=tot+' / '+totPartite()+' risultati inseriti';
}

function renderDettaglio(){
 var gi=gDet-1;
 var partite=G[gi].partite;
 var html='<div class="table-wrap"><table><thead><tr>';
 html+='<th style="text-align:left;min-width:65px">Partita</th>';
 html+='<th style="color:#FFD600">RIS</th>';
 GIOCATORI.forEach(function(g){ html+='<th class="vname">'+g.split(" ")[0]+'</th>'; });
 html+='</tr></thead><tbody>';
 partite.forEach(function(p,i){
  var r=RIS[p.id];
  html+='<tr>';
  html+='<td class="match">'+p.H+'-'+p.A+'</td>';
  html+='<td class="ris">'+(r?'<span class="ris-badge">'+r+'</span>':'<span class="nd">—</span>')+'</td>';
  GIOCATORI.forEach(function(g){
   var pr=P[gi][g]?P[gi][g][i]:"?";
   var ok=r&&pr===r, ko=r&&pr!==r;
   html+='<td class="'+(ok?"ok-bg":ko?"ko-bg":"")+'"><span class="'+(ok?"ok":ko?"ko":"nd")+'">'+pr+'</span></td>';
  });
  html+='</tr>';
 });
 html+='</tbody></table></div>';
 document.getElementById('det-table').innerHTML=html;
}

function renderInserisci(){
 var gi=gIns-1;
 var partite=G[gi].partite;
 var done=partite.filter(function(p){return !!RIS[p.id];}).length;
 document.getElementById('ins-count').textContent=done+' / '+partite.length+' risultati inseriti';
 var html='';
 partite.forEach(function(p){
  var r=RIS[p.id];
  html+='<div class="match-row'+(r?" done":"")+'">';
  html+='<div class="match-info"><b>'+p.hn+'</b><small>vs '+p.an+'</small></div>';
  ["1","X","2"].forEach(function(v){
   var selCls=r===v?(" sel"+v):"";
   html+='<button class="btn1x2'+selCls+'" onclick="toggleRis(\''+p.id+'\',\''+v+'\')">'+v+'</button>';
  });
  html+='</div>';
 });
 document.getElementById('ins-list').innerHTML=html;
}

function toggleRis(id,val){
 if(RIS[id]===val) delete RIS[id]; else RIS[id]=val;
 renderAll();
}

function renderAll(){
 renderClassifica();
 renderDettaglio();
 renderInserisci();
}

function showTab(name){
 document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
 document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
 document.getElementById(name).classList.add('active');
 event.target.classList.add('active');
}

function setGdet(g,btn){
 gDet=g;
 document.querySelectorAll('#dettaglio .gbtn').forEach(function(b){b.classList.remove('active');});
 btn.classList.add('active');
 renderDettaglio();
}

function setGins(g,btn){
 gIns=g;
 document.querySelectorAll('#inserisci .gbtn').forEach(function(b){b.classList.remove('active');});
 btn.classList.add('active');
 renderInserisci();
}

renderAll();
</script>

<script>
// Service Worker inline per funzionamento offline
var SW_CODE = `
self.addEventListener('install', function(e) {
  e.waitUntil(
    caches.open('mondiale2026-v1').then(function(cache) {
      return cache.addAll([location.href]);
    })
  );
});
self.addEventListener('fetch', function(e) {
  e.respondWith(
    caches.match(e.request).then(function(r) {
      return r || fetch(e.request).catch(function(){return caches.match(e.request);});
    })
  );
});
`;

if('serviceWorker' in navigator) {
  var blob = new Blob([SW_CODE], {type:'application/javascript'});
  var swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}

// Banner installazione PWA
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});

function installApp() {
  if(!deferredPrompt) {
    alert('Per installare:\nChrome → menu (⋮) → "Aggiungi a schermata Home"\nSafari → condividi (□↑) → "Aggiungi a schermata Home"');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(){
    deferredPrompt = null;
    document.getElementById('install-banner').style.display = 'none';
  });
}

// Su iOS mostra istruzioni manuali
var isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
var isInStandalone = window.navigator.standalone;
if(isIos && !isInStandalone) {
  setTimeout(function(){
    document.getElementById('install-banner').style.display = 'flex';
    document.querySelector('#install-banner span:nth-child(2)').textContent =
      'Safari → 🔗 Condividi → "Aggiungi a schermata Home"';
    document.querySelector('#install-banner button').style.display = 'none';
  }, 2000);
}
</script>
